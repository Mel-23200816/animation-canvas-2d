<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Bouncing Glass</a>
            <span class="navbar-text text-white">
                Simulador de Físicas 2D
            </span>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card glass-card p-4">
                    <h4 class="text-white mb-4">Controles Interactivos</h4>
                    
                    <div class="mb-4">
                        <label for="numCircles" class="form-label text-white fw-bold">
                            Círculos: <span id="valCircles" class="badge bg-light text-dark">15</span>
                        </label>
                        <input type="range" class="form-range" id="numCircles" value="15" min="1" max="100">
                    </div>

                    <div class="mb-4">
                        <label for="canvasWidth" class="form-label text-white fw-bold">
                            Ancho: <span id="valWidth" class="badge bg-light text-dark">800</span> px
                        </label>
                        <input type="range" class="form-range" id="canvasWidth" value="800" min="300" max="1200" step="10">
                    </div>

                    <div class="mb-4">
                        <label for="canvasHeight" class="form-label text-white fw-bold">
                            Alto: <span id="valHeight" class="badge bg-light text-dark">500</span> px
                        </label>
                        <input type="range" class="form-range" id="canvasHeight" value="500" min="300" max="800" step="10">
                    </div>
                    
                    </div>
            </div>

            <div class="col-md-8 d-flex justify-content-center align-items-center">
                <canvas id="canvas" class="glass-canvas"></canvas>
            </div>
        </div>
    </main>

    <footer class="glass-footer text-center text-white py-3 mt-auto">
        <div class="container">
            <p class="mb-0">Desarrollado por <strong>Cano Alejandro Miguel Angel / Mel</strong></p>
            <small>Proyecto Canvas + Bootstrap + Glassmorphism</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
